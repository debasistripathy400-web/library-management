
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Library Management System</title>
  <meta name="description" content="Library Management System - Manage books, members, and transactions.">

  <!-- Bootstrap 5 -->
  <link href="/static/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="/static/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="/static/css/style.css" rel="stylesheet">
  
</head>

<body>

  
  <!-- Not authenticated: just show the block -->
  
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-logo">📚</div>
        <h2 class="mb-1">Welcome Back</h2>
        <p class="mb-4">Sign in to Library Management System</p>

        

        <form method="post" novalidate>
            <input type="hidden" name="csrfmiddlewaretoken" value="OFnHPapPZlEuDhtiR3XMokMypcF2rrAV4xoZGafEJWvOCziFG6h3UPrYy736cSLU">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="position-relative">
                    <span
                        style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted);">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" class="form-control" placeholder="Username" autofocus maxlength="150" required id="id_username">
                </div>
                
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="position-relative">
                    <span
                        style="position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted);">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control" placeholder="Password" required id="id_password">
                </div>
                
            </div>
            <button type="submit" class="btn-primary-lms w-100 justify-content-center py-3" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>

        <div class="divider"></div>
        <p style="font-size:12px; color:var(--text-muted); text-align:center;">
            Default admin: <strong style="color:var(--primary);">admin / admin123</strong><br>
            Run <code style="font-size:11px;">python manage.py createsuperuser</code> to create your own.
        </p>
    </div>
</div>

  

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Sidebar toggle for mobile
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    if (sidebarToggle) {
      sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
    }

    // Auto-dismiss alerts after 5 seconds
    setTimeout(() => {
      document.querySelectorAll('.alert').forEach(a => {
        const bsAlert = bootstrap.Alert.getOrCreateInstance(a);
        bsAlert.close();
      });
    }, 5000);
  </script>
  
</body>

</html>
